<!DOCTYPE html>
<html>
<head>
    <title>Smart Traffic Dashboard</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
        }

        .container {
            margin-top: 80px;
        }

        .btn {
            display: inline-block;
            padding: 20px 40px;
            margin: 20px;
            font-size: 20px;
            color: white;
            background-color: #222;
            border: 2px solid white;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: white;
            color: black;
        }
    </style>
</head>

<body>

    <h1>🚦 Smart Traffic Management System</h1>

    <div class="container">

        <!-- Stored Videos -->
        <a href="/store" class="btn">
            📁 Stored Videos
        </a>

        <!-- Live Camera -->
        <a href="/live" class="btn">
            📷 Live Camera
        </a>

    </div>

</body>
</html>
