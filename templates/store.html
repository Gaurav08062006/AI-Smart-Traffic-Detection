</head>

<body>

<h1>📁 Stored Videos</h1>

<!-- VIDEO SELECTION -->

<div class="video-list">
    {% for name, url in videos.items() %}
        <button onclick="loadVideo('{{ name }}')">
            {{ name }}
        </button>
    {% endfor %}
</div>

<div style="margin-top: 20px; color: #eee; font-size: 0.9rem;">
    <p>Mapped URLs (for debugging):</p>
    <ul>
    {% for name, url in videos.items() %}
        <li><strong>{{ name }}</strong>: {{ url }}</li>
    {% endfor %}
    </ul>
</div>

<!-- VIDEO PLAYER -->

<div>
    <img id="videoPlayer" src="" width="600">
</div>

<!-- GRAPH -->

<div class="graph">
    <h3>Traffic Trend</h3>
    <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let currentVideo = null;

// LOAD VIDEO
function loadVideo(videoName) {
    currentVideo = videoName;

    const encoded = encodeURIComponent(videoName);
    document.getElementById("videoPlayer").src =
        "/video/" + encoded + "?t=" + new Date().getTime();
}

// GRAPH
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Vehicle Count',
            data: [],
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: true
            }
        },
        scales: {
            x: {
                title: {
                    display: true,
                    text: 'Time (Frames)'
                }
            },
            y: {
                title: {
                    display: true,
                    text: 'Number of Vehicles'
                },
                beginAtZero: true
            }
        }
    }
});

// UPDATE GRAPH
setInterval(() => {
    if (!currentVideo) return;

    fetch('/graph_data/' + encodeURIComponent(currentVideo))
    .then(res => res.json())
    .then(data => {
        chart.data.labels = data.map((_, i) => i);
        chart.data.datasets[0].data = data;
        chart.update();
    });
}, 1000);
</script>

</body>
</html>
